# ==========================================
# APPLICATION CONFIG
# ==========================================
spring.application.name=property-finder-backend

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/property_finder_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=property_user
spring.datasource.password=StrongPassword123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Updated to modern dialect resolution for Hibernate 6+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# SERVER CONFIG
# ==========================================
server.port=8080

# ==========================================
# FILE UPLOAD SECURITY
# ==========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# ==========================================
# LOGGING
# ==========================================
logging.level.org.springframework.security=DEBUG

# ==========================================
# MAIL CONFIGURATION (Fixes JavaMailSender Crash)
# ==========================================
# Note: For local development testing, you can use Mailpit/MailHog.
# To shift to Gmail later, change host to smtp.gmail.com, port to 587,
# enable auth/starttls, and use an App Password.
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false
debug=true
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

